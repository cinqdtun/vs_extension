<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="${stylesheetUri}">
	</head>
	<body>
		<h2 class="vscode-section-label">C++ Class Creator</h2>

		<div class="form-group" style="margin-bottom: 18px;">
			<label class="vscode-label">Output Location</label>
			<div class="vscode-description" style="
				font-family: var(--vscode-editor-font-family, monospace);
				background-color: var(--vscode-textBlock-background, rgba(128,128,128,0.1));
				padding: 6px 10px;
				border-radius: 2px;
				border-left: 3px solid var(--vscode-focusBorder);
				word-break: break-all;
			">
				${targetPath}
			</div>
		</div>

		<div class="form-group">
			<label class="vscode-label" for="class-name">Class name</label>
			<input 
				type="text" 
				class="vscode-input" 
				id="class-name" 
				placeholder="e.g., Name"
				autocomplete="off"
			>
		</div>

		<div class="form-group">
			<label class="vscode-label" for="private-id">
				Attribute Prefix 
				<span style="
					color: var(--vscode-descriptionForeground); 
					font-weight: normal; 
					font-size: calc(var(--vscode-font-size) * 0.9); 
					margin-left: 4px;
				">(optional)</span>
			</label>
			<input 
				type="text" 
				class="vscode-input" 
				id="private-id" 
				placeholder="e.g., m_ or _"
				autocomplete="off"
			>
		</div>

		<div id="attributes-container"></div>

		<div style="display: flex; gap: 12px; margin-top: 16px;">
			<button class="vscode-button secondary" id="add-btn" type="button">
				Add attribute
			</button>
			<button class="vscode-button" id="generate-btn" type="button">
				Generate Class
			</button>
		</div>

		<div id="toast-container" style="
			position: fixed;
			bottom: 20px;
			right: 20px;
			z-index: 10000;
			display: flex;
			flex-direction: column;
			gap: 10px;
		"></div>

		<script>
			const vscode = acquireVsCodeApi();
			const previousState = vscode.getState();

			const container = document.getElementById('attributes-container');
			const addBtn = document.getElementById('add-btn');
			const generateBtn = document.getElementById('generate-btn');
			const classNameInput = document.getElementById('class-name');
			const privateIdInput = document.getElementById('private-id');

			let attributes = [];
			let attributeCount = 0;

			function showToast(message, type = 'info') {
				const container = document.getElementById('toast-container');
				const toast = document.createElement('div');
				
				toast.className = `vscode-toast ${type}`;
				toast.textContent = message;
				
				container.appendChild(toast);
				
				// Auto-remove after 4 seconds
				setTimeout(() => {
					toast.style.opacity = '0';
					toast.style.transition = 'opacity 0.3s ease';
					toast.addEventListener('transitionend', () => toast.remove());
				}, 4000);
			}

			function updateState(changes) {
				const currentState = vscode.getState() || {};
				
				vscode.setState({
					...currentState,
					...changes
				});
			}

			function focusLastAttribute() {
				const allRows = container.querySelectorAll('.attribute-row');
				const lastRow = allRows[allRows.length - 1];

				if (!lastRow)
					return;

				const lastInput = lastRow.querySelector('.attr-type');
				if (!lastInput)
					return;
						
				lastInput.focus();
			}

			function focusAttributeType(idx) {
				const allRows = container.querySelectorAll('.attribute-row');
				const row = allRows[idx];

				if (!row)
					return;

				const input = row.querySelector('.attr-type');
				if (!input)
					return;
						
				input.focus();
			}

			function focusAttributeName(idx) {
				const allRows = container.querySelectorAll('.attribute-row');
				const row = allRows[idx];

				if (!row)
					return;

				const input = row.querySelector('.attr-name');
				if (!input)
					return;
						
				input.focus();
			}

			function drawAttribute(attrData) {
				attributeCount++;

				const id = attributeCount;
				const row = document.createElement('div');

				row.className = 'attribute-row';
				row.id = 'row-' + id;

				row.innerHTML = `
					<div class="attribute-field">
						<label class="vscode-label">Attribute type</label>
						<input type="text" class="vscode-input attr-type" placeholder="e.g., std::string" autocomplete="off" value="${attrData.type || ''}">
					</div>
					<div class="attribute-field">
						<label class="vscode-label">Attribute name</label>
						<input type="text" class="vscode-input attr-name" placeholder="e.g., name" autocomplete="off" value="${attrData.name || ''}">
					</div>
					<button class="vscode-button secondary delete-btn" type="button" style="margin: 0; padding: 6px 12px; height: 32px;">
						Delete
					</button>
				`;

				row.querySelector('.delete-btn').addEventListener('click', () => {
					const allRows = Array.from(container.querySelectorAll('.attribute-row'));
					const id = allRows.indexOf(row);
					const prevIdx = Math.max(0, idx - 1);

					attributes.splice(id, 1);
					updateState({ attributes: attributes });
					row.remove();
					focusAttributeType(prevIdx);
				});

				const attrName = row.querySelector('.attr-name')
				attrName.addEventListener('input', () => {
					const allRows = Array.from(container.querySelectorAll('.attribute-row'));
					const id = allRows.indexOf(row);

					attributes[id] = { ...attributes[id], name: attrName.value };
					updateState({ attributes: attributes });
				});

				const attrType = row.querySelector('.attr-type')
				attrType.addEventListener('input', () => {
					const allRows = Array.from(container.querySelectorAll('.attribute-row'));
					const id = allRows.indexOf(row);

					attributes[id] = { ...attributes[id], type: attrType.value };
					updateState({ attributes: attributes });
				});

				attributes = [...attributes, attrData];
				updateState({ attributes: attributes });

				container.appendChild(row);
			}

			function createClass() {
				const filteredClassName = document.getElementById('class-name').value.trim();
				const filteredPrivateId = document.getElementById('private-id').value.trim();

				const activeRows = document.querySelectorAll('.attribute-row');
				const arrActiveRows = Array.from(activeRows);
				const areAttrEmpty = arrActiveRows.some((row) => {
					const filteredType = row.querySelector('.attr-type').value.trim();
					const filteredName = row.querySelector('.attr-name').value.trim();

					return (!filteredType || !filteredName);
				});

				if (!filteredClassName || areAttrEmpty) {
					showToast("Some fields are empty.", "error");
					return;
				}

				const structuredAttributes = arrActiveRows.map(row => ({
					type: row.querySelector('.attr-type').value.trim(),
					name: row.querySelector('.attr-name').value.trim()
				}));

				vscode.postMessage({
					command: 'createClass',
					className: filteredClassName,
					privateId: filteredPrivateId,
					attributes: structuredAttributes
				});
			}

			function isAttribute(el) {
				return (el.classList.contains('attr-type') || el.classList.contains('attr-name') || el.classList.contains('attribute-field'));
			}

			function isClassName(el) {
				return (el.id === 'class-name');
			}

			function getAttributeIdx(target) {
				const activeRows = document.querySelectorAll('.attribute-row');
				const arrActiveRows = Array.from(activeRows);

				const row = target.closest('.attribute-row');

				if (!row) {
					return -1;
				}

				const idx = arrActiveRows.indexOf(row);
				return idx;
			}

			function moveWebviewVertical(idx, resetVertical = false) {
				const isNameField = event.target.classList.contains('attr-name');

				if (idx < 0) {
					classNameInput.focus();
					return;
				}

				if (isNameField && !resetVertical) {
					focusAttributeName(idx);
					return;
				}

				focusAttributeType(idx);
			}

			if (previousState) {
				classNameInput.value = previousState.className || '';
				privateIdInput.value = previousState.privateId || '';
				const prevAttributes = previousState.attributes || [];
				
				for (const attribute of prevAttributes) {
					drawAttribute(attribute);
				}
			}

			classNameInput.focus();

			classNameInput.addEventListener('input', () => {
				updateState({ className: classNameInput.value });
			});

			privateIdInput.addEventListener('input', () => {
				updateState({ privateId: privateIdInput.value  });
			});

			addBtn.addEventListener('click', () => {
				drawAttribute({ name: "", type: ""});
			});

			generateBtn.addEventListener('click', () => {
				createClass();
			});

			window.addEventListener('keydown', (event) => {
				const key = event.key.toLowerCase();
				const isMetaKey = event.ctrlKey || event.metaKey;
				const isAttribute = isAttribute(event.target);
				const isClassName = isClassName(event.target);

				if (key === "a" && isMetaKey) {
					event.preventDefault();
					drawAttribute({ name: "", type: "" });
					focusLastAttribute();
				}

				if (key === 'd' && isMetaKey && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(event.target);

					if (idx == -1) {
						return;
					}

					const prevIdx = idx - 1;

					attributes.splice(idx, 1);
					updateState({ attributes: attributes });

					row.remove();

					moveWebviewVertical(prevIdx, true);
				}

				if (key === 'arrowup' && isMetaKey && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(event.target);

					if (idx == -1) {
						return;
					}

					const prevIdx = idx - 1;
					moveWebviewVertical(prevIdx);
				}

				if (key === 'arrowdown' && isMetaKey && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(event.target);

					if (idx == -1) {
						return;
					}

					const prevIdx = idx + 1;
					moveWebviewVertical(prevIdx);
				}

				if (key === 'arrowdown' && isMetaKey && isClassName) {
					event.preventDefault();

					focusAttributeType(0);
				}

				if (key === 'arrowleft' && isMetaKey && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(event.target);

					if (idx == -1) {
						return;
					}

					focusAttributeType(idx);
				}

				if (key === 'arrowright' && isMetaKey && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(event.target);

					if (idx == -1) {
						return;
					}

					focusAttributeName(idx);
				}

				if (key === 'enter') {
					event.preventDefault();
					createClass();
				}
			});
		</script>
	</body>
</html>

<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style id="styles"></style>
	</head>

	<body>
		<template id="attribute-template">
			<div class="attribute-row">
				<div class="attribute-field">
					<label class="vscode-label">Attribute type</label>
					<input type="text" class="vscode-input attr-type" placeholder="e.g., std::string" autocomplete="off" value="">
				</div>
				<div class="attribute-field">
					<label class="vscode-label">Attribute name</label>
					<input type="text" class="vscode-input attr-name" placeholder="e.g., name" autocomplete="off" value="">
				</div>
				<button class="vscode-button 
								secondary 
								delete-btn
								m-0
								py-1.5
								px-3
								h-8"
								self-end
						type="button">
					Delete
				</button>
			</div>
		</template>

		<div id="target-path-data" class="hidden" data-value="__TARGET_PATH__"></div>

		<h2 class="vscode-section-label">Create C++ class</h2>

		<div class="form-group" style="margin-bottom: 18px;">
			<label class="vscode-label">Output Location</label>
			<div id="target-path" class="vscode-description 
						py-1.5
						px-2.5
						rounded-xs 
						break-all 
						font-(--vscode-editor-font-family,monospace)
						bg-(--vscode-textBlock-background,rgba(128,128,128,0.1))
						border-l-[3px] 
						border-(--vscode-focusBorder)">
			</div>
		</div>

		<div class="form-group">
			<label class="vscode-label" for="class-name">Class name</label>
			<input 
				type="text" 
				class="vscode-input" 
				id="class-name" 
				placeholder="e.g., Name"
				autocomplete="off"
			>
		</div>

		<div class="form-group">
			<label class="vscode-label" for="private-id">
				Attribute Prefix 
				<span class="text-(--vscode-descriptionForeground)
							 text-(length:var(--vscode-font-size) * 0.9)
							 font-normal
							 ml-1">
							 (optional)</span>
			</label>
			<input 
				type="text" 
				class="vscode-input" 
				id="private-id" 
				placeholder="e.g., m_ or _"
				autocomplete="off"
			>
		</div>

		<div id="attributes-container"></div>

		<div class="flex
					gap-3
					mt-4">
			<button class="vscode-button secondary" id="add-btn" type="button">
				Add attribute
			</button>
			<button class="vscode-button" id="generate-btn" type="button">
				Generate Class
			</button>
		</div>

		<div id="toast-container" 
			 class="fixed
					bottom-5
					right-5
					z-10000
					flex
					flex-col
					gap-2.5"></div>

		<script>
			const vscode = acquireVsCodeApi();
			const previousState = vscode.getState();

			const container = document.getElementById('attributes-container');
			const attributeTemplate = document.getElementById('attribute-template');
			const addBtn = document.getElementById('add-btn');
			const generateBtn = document.getElementById('generate-btn');
			const classNameInput = document.getElementById('class-name');
			const privateIdInput = document.getElementById('private-id');
			const targetPath = document.getElementById('target-path');
			const targetPathData = document.getElementById('target-path-data').dataset.value;

			let attributes = [];
			let attributeCount = 0;
			let keysPressed = {};

			function showToast(message, type = 'info') {
				const container = document.getElementById('toast-container');
				const toast = document.createElement('div');
				
				toast.className = `vscode-toast ${type}`;
				toast.textContent = message;
				
				container.appendChild(toast);
				
				// Auto-remove after 4 seconds
				setTimeout(() => {
					toast.style.opacity = '0';
					toast.style.transition = 'opacity 0.3s ease';
					toast.addEventListener('transitionend', () => toast.remove());
				}, 4000);
			}

			function updateState(changes) {
				const currentState = vscode.getState() || {};
				
				vscode.setState({
					...currentState,
					...changes
				});
			}

			function focusLastAttribute() {
				const allRows = container.querySelectorAll('.attribute-row');
				const lastRow = allRows[allRows.length - 1];

				if (!lastRow)
					return;

				const lastInput = lastRow.querySelector('.attr-type');
				if (!lastInput)
					return;
						
				lastInput.focus();
			}

			function focusAttributeType(idx) {
				const allRows = container.querySelectorAll('.attribute-row');
				const row = allRows[idx];

				if (!row)
					return;

				const input = row.querySelector('.attr-type');
				if (!input)
					return;
						
				input.focus();
			}

			function focusAttributeName(idx) {
				const allRows = container.querySelectorAll('.attribute-row');
				const row = allRows[idx];

				if (!row)
					return;

				const input = row.querySelector('.attr-name');
				if (!input)
					return;
						
				input.focus();
			}

			function getAttributeIdx(target) {
				const activeRows = document.querySelectorAll('.attribute-row');
				const arrActiveRows = Array.from(activeRows);

				const row = target.closest('.attribute-row');

				if (!row) {
					return -1;
				}

				const idx = arrActiveRows.indexOf(row);
				return idx;
			}

			function moveWebviewVertical(idx, resetVertical = false) {
				const isNameField = document.activeElement.classList.contains('attr-name');

				if (idx < 0) {
					classNameInput.focus();
					return;
				}

				if (isNameField && !resetVertical) {
					focusAttributeName(idx);
					return;
				}

				focusAttributeType(idx);
			}

			function removeAttribute(idx) {
				if (idx < 0) {
					return;
				}

				const prevIdx = idx - 1;
				const activeRows = document.querySelectorAll('.attribute-row');
				const arrActiveRows = Array.from(activeRows);
				const row = arrActiveRows[idx];

				attributes.splice(idx, 1);
				updateState({ attributes: attributes });
				row.remove();

				moveWebviewVertical(prevIdx, true);
			}

			function drawAttribute(attrData) {
				attributeCount++;

				const id = attributeCount;
				const clone = attributeTemplate.content.cloneNode(true);
				const row = clone.firstElementChild;

				const deleteBtn = row.querySelector('.delete-btn');
				deleteBtn.addEventListener('click', () => {
					const idx = getAttributeIdx(deleteBtn);

					if (idx == -1) {
						return;
					}

					removeAttribute(idx);
				});

				const attrName = row.querySelector('.attr-name');
				attrName.value = `${attrData.name || ''}`;
				attrName.addEventListener('input', () => {
					const idx = getAttributeIdx(deleteBtn);

					if (idx == -1) {
						return;
					}
					
					attributes[idx] = { ...attributes[idx], name: attrName.value };
					updateState({ attributes: attributes });
				});

				const attrType = row.querySelector('.attr-type');
				attrType.value = `${attrData.type || ''}`;
				attrType.addEventListener('input', () => {
					const idx = getAttributeIdx(deleteBtn);

					if (idx == -1) {
						return;
					}

					attributes[idx] = { ...attributes[idx], type: attrType.value };
					updateState({ attributes: attributes });
				});

				attributes = [...attributes, attrData];
				updateState({ attributes: attributes });

				container.appendChild(row);
			}

			function createClass() {
				const filteredClassName = document.getElementById('class-name').value.trim();
				const filteredPrivateId = document.getElementById('private-id').value.trim();

				const activeRows = document.querySelectorAll('.attribute-row');
				const arrActiveRows = Array.from(activeRows);
				const areAttrEmpty = arrActiveRows.some((row) => {
					const filteredType = row.querySelector('.attr-type').value.trim();
					const filteredName = row.querySelector('.attr-name').value.trim();

					return (!filteredType || !filteredName);
				});

				if (!filteredClassName || areAttrEmpty) {
					showToast("Some fields are empty.", "error");
					return;
				}

				const structuredAttributes = arrActiveRows.map(row => ({
					type: row.querySelector('.attr-type').value.trim(),
					name: row.querySelector('.attr-name').value.trim()
				}));

				vscode.postMessage({
					command: 'createClass',
					className: filteredClassName,
					privateId: filteredPrivateId,
					attributes: structuredAttributes
				});
			}

			function testAttribute(el) {
				return (el.classList.contains('attr-type') || el.classList.contains('attr-name') || el.classList.contains('attribute-field'));
			}

			function testClassName(el) {
				return (el.id === 'class-name');
			}

			targetPath.textContent = targetPathData;

			if (previousState) {
				classNameInput.value = previousState.className || '';
				privateIdInput.value = previousState.privateId || '';
				const prevAttributes = previousState.attributes || [];
				
				for (const attribute of prevAttributes) {
					drawAttribute(attribute);
				}
			}

			classNameInput.focus();

			classNameInput.addEventListener('input', () => {
				updateState({ className: classNameInput.value });
			});

			privateIdInput.addEventListener('input', () => {
				updateState({ privateId: privateIdInput.value  });
			});

			addBtn.addEventListener('click', () => {
				drawAttribute({ name: "", type: ""});
			});

			generateBtn.addEventListener('click', () => {
				createClass();
			});

			window.addEventListener('keyup', (event) => {
				const key = event.key.toLowerCase();

				keysPressed[key] = false;
    
				if (!event.ctrlKey && !event.metaKey) {
					keysPressed['modifier'] = false;
				}
			});
			window.addEventListener('keydown', (event) => {
				const key = event.key.toLowerCase();

				if (event.ctrlKey || event.metaKey) {
					keysPressed['modifier'] = true;
				}

				keysPressed[key] = true;

				const isAttribute = testAttribute(document.activeElement);
				const isClassName = testClassName(document.activeElement);

				if (keysPressed["a"] && keysPressed['modifier']) {
					event.preventDefault();
					drawAttribute({ name: "", type: "" });
					focusLastAttribute();
				}

				if (keysPressed['d'] && keysPressed['modifier'] && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(document.activeElement);

					if (idx == -1) {
						return;
					}

					removeAttribute(idx);
				}

				if (keysPressed['modifier'] && keysPressed['arrowup'] && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(document.activeElement);

					if (idx == -1) {
						return;
					}

					const prevIdx = idx - 1;
					moveWebviewVertical(prevIdx);
				}

				if (keysPressed['modifier'] && keysPressed['arrowdown'] && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(document.activeElement);

					if (idx == -1) {
						return;
					}

					const prevIdx = idx + 1;
					moveWebviewVertical(prevIdx);
				}

				if (keysPressed['modifier'] && keysPressed['arrowdown'] && isClassName) {
					event.preventDefault();

					focusAttributeType(0);
				}

				if (keysPressed['modifier'] && keysPressed['arrowleft'] && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(document.activeElement);

					if (idx == -1) {
						return;
					}

					focusAttributeType(idx);
				}

				if (keysPressed['modifier'] && keysPressed['arrowright'] && isAttribute) {
					event.preventDefault();
					const idx = getAttributeIdx(document.activeElement);

					if (idx == -1) {
						return;
					}

					focusAttributeName(idx);
				}

				if (keysPressed['enter']) {
					event.preventDefault();
					createClass();
				}
			});

			window.addEventListener('blur', () => {
				// Clear all keys since windows is out of focus
				for (let k in keysPressed) keysPressed[k] = false;
			});
		</script>
	</body>
</html>
